name: SEO niche grade

# Accumulate-mode SEO Lab pipeline — INCREMENTAL-RENDER design (2026-06-12).
#
# Lesson from 2026-06-10: the hourly cadence + a 25-run burst exhausted the free private-repo
# Actions quota (2,000 min/mo; runs averaged 75 min) and the pipeline silently died — jobs
# failed before a runner was assigned, so even the Slack alert never fired. Fix is structural:
#   - every 8h, a rotating 1/3 slice => the FULL keyword pool still gets a SERP rank
#     observation daily (same DataForSEO spend as before)
#   - but only NEW or >14-day-stale pages are rendered (filter_render.py); already-fresh
#     pages become rank-only shard rows merged by the coalescing loader
#   - pip + Playwright browsers cached between runs
# Steady-state budget: ~3 runs/day × ~15-20 min ≈ 45-60 min/day ≈ ~1,500-1,800 min/mo — fits
# the free tier. Needs repo secret DATAFORSEO_B64 (PAGESPEED_API_KEY optional).

on:
  workflow_dispatch:
    inputs:
      slice_index:
        description: "Rotation slice to run (0-2). Blank = auto by 8h window."
        required: false
        default: ""
  schedule:
    - cron: '20 */8 * * *'   # every 8h — 3 slices/day, full keyword pool covered daily

permissions:
  contents: write

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout vault
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: .github/workflows/seo-grade.yml

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          python -m playwright install --with-deps chromium

      - name: Pull AU SERPs (rotating third of the keyword pool)
        env:
          DATAFORSEO_B64: ${{ secrets.DATAFORSEO_B64 }}
        run: |
          IDX="${{ github.event.inputs.slice_index }}"
          if [ -z "$IDX" ]; then IDX=$(( ( $(date +%s) / 28800 ) % 3 )); fi
          echo "rotation slice: $IDX of 3"
          python serp_batch.py keywords.json data/urls_batch.json 3 "$IDX"

      - name: Split into render vs rank-only (incremental render)
        env:
          RENDER_TTL_DAYS: "14"
          RENDER_CAP: "500"
        run: python filter_render.py data/urls_batch.json data/corpus.jsonl data/urls_to_render.json data/rank_only.json

      - name: Render new + stale pages only
        env:
          RENDER_CONCURRENCY: "10"
          RENDER_CHUNK: "150"
        run: python scrape_render.py data/urls_to_render.json data/results_batch_render.json

      - name: Enrich (traffic + ranked-keywords)
        continue-on-error: true
        env:
          DATAFORSEO_B64: ${{ secrets.DATAFORSEO_B64 }}
        run: python enrich_dataforseo.py data/results_batch_render.json

      - name: Backlinks authority (Semrush, cached once per domain)
        continue-on-error: true
        env:
          SEMRUSH_API_KEY: ${{ secrets.SEMRUSH_API_KEY }}
        run: |
          python backlinks_semrush.py data/results_batch_render.json
          python backlinks_semrush.py data/rank_only.json

      - name: Sample page speed (Core Web Vitals)
        continue-on-error: true
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          PAGESPEED_CAP: "40"
        run: python pagespeed.py data/results_batch_render.json

      - name: Append to the accumulating corpus (rendered + rank-only shards)
        run: |
          python accumulate.py data/results_batch_render.json data/corpus
          python accumulate.py data/rank_only.json data/corpus --rank-only

      - name: Grade the whole corpus
        run: |
          mkdir -p grades
          python grade.py data/corpus.jsonl grades/corpus-latest.md

      - name: Position-bucket analysis (page-1 differentiators)
        run: python analyze_by_position.py data/corpus.jsonl > grades/by-position-latest.md

      - name: Rank-movement analysis (longitudinal)
        continue-on-error: true
        run: python analyze_movement.py data/corpus.jsonl > grades/movement-latest.md

      - name: Regenerate the rulebook (auto-updating; defers to audit-verified verdicts)
        continue-on-error: true
        run: python rulebook.py data/corpus.jsonl grades/rulebook.md

      - name: Upload screenshots + raw HTML (artifact, not committed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-render-artifacts
          path: |
            data/screenshots
            data/render
          if-no-files-found: ignore

      - name: Commit corpus + grade to the vault
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/corpus data/authority grades/corpus-latest.md grades/by-position-latest.md grades/movement-latest.md grades/rulebook.md
          git commit -m "SEO corpus: +1 run ($(date +%F))" || { echo "no changes"; exit 0; }
          for i in 1 2 3; do
            git pull --rebase --autostash -X theirs && git push && break
            echo "push retry $i"; sleep 5
          done

      - name: Notify Slack (success or failure)
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then echo "no SLACK_WEBHOOK secret set — skipping notify"; exit 0; fi
          ROWS=$(cat data/corpus.jsonl data/corpus/*.jsonl 2>/dev/null | grep -c run_date || echo "?")
          RUNURL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "${{ job.status }}" = "success" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then echo "manual/burst run success — no Slack ping (avoids spam)"; exit 0; fi
            MSG="<@U092EB6KA5C> ✅ SEO Lab run complete — corpus now $ROWS observations. Latest grade: wiki/seo-lab/grades/corpus-latest.md"
          elif [ "${{ job.status }}" = "cancelled" ]; then
            MSG="ℹ️ SEO Lab run cancelled (deliberate, no action needed): $RUNURL"
          else
            MSG="<@U092EB6KA5C> ❌ SEO Lab run failed — needs a look: $RUNURL"
          fi
          curl -s -X POST -H 'Content-type: application/json' --data "{\"text\": \"$MSG\"}" "$SLACK_WEBHOOK" > /dev/null && echo "Slack notified"
